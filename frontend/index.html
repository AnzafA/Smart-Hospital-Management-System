<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Hospital - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-container animate-fade-in">
            <div class="login-left animate-slide-in-left">
                <div class="hospital-brand">
                    <i class="fas fa-hospital-alt hospital-icon"></i>
                    <h1>City Hospital</h1>
                    <p>Management System</p>
                </div>
                <div class="features-list">
                    <div class="feature-item animate-slide-in-up" style="animation-delay: 0.2s">
                        <i class="fas fa-user-md"></i>
                        <span>Patient Management</span>
                    </div>
                    <div class="feature-item animate-slide-in-up" style="animation-delay: 0.3s">
                        <i class="fas fa-calendar-check"></i>
                        <span>Appointment Scheduling</span>
                    </div>
                    <div class="feature-item animate-slide-in-up" style="animation-delay: 0.4s">
                        <i class="fas fa-file-invoice"></i>
                        <span>Billing System</span>
                    </div>
                    <div class="feature-item animate-slide-in-up" style="animation-delay: 0.5s">
                        <i class="fas fa-pills"></i>
                        <span>Medicine Inventory</span>
                    </div>
                    <div class="feature-item animate-slide-in-up" style="animation-delay: 0.6s">
                        <i class="fas fa-user-nurse"></i>
                        <span>Staff Management</span>
                    </div>
                </div>
            </div>
            <div class="login-right animate-slide-in-right">
                <form id="loginForm" class="login-form">
                    <h2>Welcome Back</h2>
                    <p class="subtitle">Please login to continue</p>
                    
                    <div class="input-group animate-fade-in" style="animation-delay: 0.3s">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" placeholder="Username" required value="admin">
                    </div>
                    
                    <div class="input-group animate-fade-in" style="animation-delay: 0.4s">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Password" required value="Admin@123">
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                    
                    <div class="remember-forgot animate-fade-in" style="animation-delay: 0.5s">
                        <label>
                            <input type="checkbox" checked> Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="login-btn animate-pulse">
                        <span>Login</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    
                    <div class="demo-credentials animate-fade-in" style="animation-delay: 0.6s">
                        <p><i class="fas fa-info-circle"></i> Demo Credentials:</p>
                        <small>Username: admin | Password: Admin@123</small>
                    </div>
                    
                    <div class="setup-section animate-fade-in" style="animation-delay: 0.7s">
                        <button type="button" class="setup-btn" onclick="initializeDatabase()">
                            <i class="fas fa-cog"></i> Initialize Database
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>


</html>
